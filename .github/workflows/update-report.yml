name: Update Avito report

on:
  workflow_dispatch:
    inputs:
      force_avito:
        description: "Force Avito API refresh"
        required: false
        default: "false"
  schedule:
    # 08:00, 13:00, 16:00 Asia/Yekaterinburg = 03:00, 08:00, 11:00 UTC
    - cron: "0 3,8,11 * * *"

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    env:
      AVITO_ENABLE_API: ${{ secrets.AVITO_ENABLE_API }}
      AVITO_CLIENT_ID: ${{ secrets.AVITO_CLIENT_ID }}
      AVITO_CLIENT_SECRET: ${{ secrets.AVITO_CLIENT_SECRET }}
      AVITO_ACCOUNT_ID: ${{ secrets.AVITO_ACCOUNT_ID }}
      AVITO_CAMPAIGN_ID: ${{ secrets.AVITO_CAMPAIGN_ID }}
      AVITO_CAMPAIGN_NAME: ${{ secrets.AVITO_CAMPAIGN_NAME }}
      AVITO_CAMPAIGNS_JSON: ${{ secrets.AVITO_CAMPAIGNS_JSON }}
      AVITO_CAMPAIGN_IDS: ${{ secrets.AVITO_CAMPAIGN_IDS }}
      AVITO_CAMPAIGN_NAMES: ${{ secrets.AVITO_CAMPAIGN_NAMES }}
      AVITO_CAMPAIGN_SLUGS: ${{ secrets.AVITO_CAMPAIGN_SLUGS }}
      AVITO_AUTO_DISCOVER_CAMPAIGNS: ${{ secrets.AVITO_AUTO_DISCOVER_CAMPAIGNS }}
      AVITO_CAMPAIGN_LIST_PATH_TEMPLATE: ${{ secrets.AVITO_CAMPAIGN_LIST_PATH_TEMPLATE }}
      AVITO_CAMPAIGN_LIST_METHOD: ${{ secrets.AVITO_CAMPAIGN_LIST_METHOD }}
      AVITO_STATS_METHOD: ${{ secrets.AVITO_STATS_METHOD }}
      AVITO_STATS_PATH_TEMPLATE: ${{ secrets.AVITO_STATS_PATH_TEMPLATE }}
      AVITO_STATS_BODY_JSON: ${{ secrets.AVITO_STATS_BODY_JSON }}
      AVITO_GROUP_BY: ${{ secrets.AVITO_GROUP_BY }}
      AVITO_LOOKBACK_DAYS: ${{ secrets.AVITO_LOOKBACK_DAYS }}
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      BITRIX_ENTITY_TYPE: deal
      BITRIX_DATE_FIELD: ${{ secrets.BITRIX_DATE_FIELD }}
      BITRIX_UTM_SOURCE_FIELD: UTM_SOURCE
      BITRIX_UTM_MEDIUM_FIELD: UTM_MEDIUM
      BITRIX_UTM_CAMPAIGN_FIELD: UTM_CAMPAIGN
      BITRIX_UTM_GROUPS_JSON: >-
        [{"source":"avito_media","medium":"banner"},{"source":"avito_reklama","medium":"cpc"}]
      BITRIX_CAMPAIGN_DATE_MAP_JSON: ${{ secrets.BITRIX_CAMPAIGN_DATE_MAP_JSON }}
      BITRIX_DEAL_CATEGORY_ID: ${{ secrets.BITRIX_DEAL_CATEGORY_ID }}
      BITRIX_DEAL_CATEGORY_NAME: "Комфорт: прямые продажи"
      BITRIX_STAGE_FIELD: STAGE_ID
      BITRIX_COMMENT_FIELD: COMMENTS
      BITRIX_EXCLUDED_STAGE_NAMES: "Дубль. Создана новая сделка,Наш сотрудник"
      BITRIX_UNTOUCHED_STAGE_NAMES: ${{ secrets.BITRIX_UNTOUCHED_STAGE_NAMES }}
      BITRIX_EXCLUDED_COMMENT_PHONES: "71111111111"
      REPORT_START_DATE: ${{ secrets.REPORT_START_DATE }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update cached data and build report
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.force_avito }}" = "true" ]; then
            python update_report.py --force
          else
            python update_report.py
          fi

      - name: Update Formula report
        env:
          AVITO_ENABLE_API: ${{ secrets.AVITO_SECOND_ENABLE_API }}
          AVITO_CLIENT_ID: ${{ secrets.AVITO_SECOND_CLIENT_ID }}
          AVITO_CLIENT_SECRET: ${{ secrets.AVITO_SECOND_CLIENT_SECRET }}
          AVITO_ACCOUNT_ID: ${{ secrets.AVITO_SECOND_ACCOUNT_ID }}
          AVITO_TOKEN_URL: ${{ secrets.AVITO_SECOND_TOKEN_URL }}
          AVITO_BASE_URL: ${{ secrets.AVITO_SECOND_BASE_URL }}
          AVITO_STATS_METHOD: ${{ secrets.AVITO_SECOND_STATS_METHOD }}
          AVITO_STATS_PATH_TEMPLATE: ${{ secrets.AVITO_SECOND_STATS_PATH_TEMPLATE }}
          AVITO_STATS_BODY_JSON: ${{ secrets.AVITO_SECOND_STATS_BODY_JSON }}
          AVITO_GROUP_BY: ${{ secrets.AVITO_SECOND_GROUP_BY }}
          AVITO_LOOKBACK_DAYS: ${{ secrets.AVITO_SECOND_LOOKBACK_DAYS }}
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_SECOND_WEBHOOK_URL }}
          BITRIX_DATE_FIELD: ${{ secrets.BITRIX_SECOND_DATE_FIELD }}
          REPORT_START_DATE: ${{ secrets.REPORT_SECOND_START_DATE }}
        run: |
          if [ -z "$AVITO_CLIENT_ID" ] || [ -z "$AVITO_CLIENT_SECRET" ] || [ -z "$AVITO_ACCOUNT_ID" ] || [ -z "$BITRIX_WEBHOOK_URL" ]; then
            echo "Formula report skipped: second account secrets are not configured"
            exit 0
          fi
          if [ -z "$AVITO_ENABLE_API" ]; then
            export AVITO_ENABLE_API=1
          fi
          if [ -z "$AVITO_GROUP_BY" ]; then
            export AVITO_GROUP_BY=day
          fi
          if [ -z "$AVITO_LOOKBACK_DAYS" ]; then
            export AVITO_LOOKBACK_DAYS=90
          fi
          if [ -z "$BITRIX_DATE_FIELD" ]; then
            export BITRIX_DATE_FIELD=DATE_CREATE
          fi
          if [ -z "$REPORT_START_DATE" ]; then
            export REPORT_START_DATE=2026-03-01
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.force_avito }}" = "true" ]; then
            python update_formula_report.py --force
          else
            python update_formula_report.py
          fi

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html avito_report.html avito_campaigns.json update_formula_report.py
          if [ -f "formula_avito_report.html" ]; then
            git add formula_avito_report.html
          fi
          if [ -f "formula/index.html" ]; then
            git add formula/index.html
          fi
          if [ -f "avito_formula_campaigns.json" ]; then
            git add avito_formula_campaigns.json
          fi
          if compgen -G "data/avito/*.json" > /dev/null; then
            git add data/avito/*.json
          fi
          if compgen -G "data/avito_formula/*.json" > /dev/null; then
            git add data/avito_formula/*.json
          fi
          if git diff --cached --quiet; then
            echo "No report changes"
          else
            git commit -m "Update Avito report"
            git push
          fi
